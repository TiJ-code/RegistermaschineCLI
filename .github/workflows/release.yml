name: release.yml
on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Level of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - test

jobs:
  version-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.versioning.outputs.NEW_VER }}
      token: ${{ steps.generate_token.outputs.token }}

    steps:
      - name: Generate Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Calculate & Set New Version
        id: versioning
        shell: bash
        run: |
          CURRENT_VER=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          
          IFS='.' read -ra ADDR <<< "$CURRENT_VER"
          MAJOR=${ADDR[0]}
          MINOR=${ADDR[1]}
          PATCH=${ADDR[2]}
          
          if [[ "${{ github.event.inputs.bump_type }}" == "major" ]]; then
            NEW_VER="$(( MAJOR + 1 )).0.0"
          elif [[ "${{ github.event.inputs.bump_type }}" == "minor" ]]; then
            NEW_VER="$MAJOR.$((MINOR + 1)).0"
          elif [[ "${{ github.event.inputs.bump_type }}" == "patch" ]]; then
            NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          else
            NEW_VER="$MAJOR.$MINOR.$PATCH.test"
          fi
          
          echo "NEW_VER=$NEW_VER" >> $GITHUB_OUTPUT
          mvn versions:set -DnewVersion=$NEW_VER -DgenerateBackupPoms=false

      - name: Commit & Push
        if: github.event.inputs.bump_type != 'test'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git commit -am "[ACTION] bump version to ${{ steps.versioning.outputs.NEW_VER }}"
          git push origin main
          
          git tag release-v${{ steps.versioning.outputs.NEW_VER }}
          git push origin release-v${{ steps.versioning.outputs.NEW_VER }}

  build:
    needs: version-bump
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Maven settings
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github-registermaschine</id>
                <username>TiJ-code</username>
                <password>${{ secrets.PACKAGE_TOKEN }}</password>
              </server>
              <server>
                <id>github-jissuesystem</id>
                <username>TiJ-code</username>
                <password>${{ secrets.PACKAGE_TOKEN }}</password>
              </server>
            </servers>
          </settings>

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          overwrite-settings: false

      - name: Build JAR
        shell: bash
        run: mvn -B clean package -DskipTests

      - name: Upload Artifact
        if: github.event.inputs.bump_type != 'test'
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/console*.jar


  package-and-release:
    needs: [version-bump, build]
    name: "Package & Release: ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    permissions:
      contents: write
      packages: read

    steps:
      - name: Download Artifact
        if: github.event.inputs.bump_type != 'test'
        uses: actions/download-artifact@v4
        with:
          name: jar
          path: .

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Package
        if: github.event.inputs.bump_type != 'test'
        shell: bash
        run: |
          rm -rf dist bundle runtime app.jar
          mkdir -p dist
          
          VERSION="${{ needs.version-bump.outputs.new_version }}"
          
          JAR=$(find . -maxdepth 1 -name "*.jar" | head -n 1)
          
          cp "$JAR" dist/cli-v${{ needs.version-bump.outputs.new_version }}.jar
          cp "$JAR" app.jar
          
          jlink \
            --add-modules java.base,java.net.http,java.logging,jdk.charsets \
            --output runtime \
            --strip-debug \
            --no-header-files \
            --no-man-pages
          
          mkdir -p bundle
          mv runtime bundle/jre
          mv app.jar bundle/
          
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo "@echo off" > bundle/jcc.bat
            echo "jre\\bin\\java -jar app.jar name=jcc.bat" >> bundle/jcc.bat
            7z a "dist/cli-v${VERSION}-windows.zip" ./bundle/*
          else
            echo "#!/bin/sh" > bundle/jcc
            echo "./jre/bin/java -jar app.jar name=jcc" >> bundle/jcc
            chmod +x bundle/jcc
          
            OS_NAME="linux"
            [[ "${{ matrix.os }}" == "macos-latest" ]] && OS_NAME="macos"
          
            cd bundle && zip -r "../dist/cli-v${VERSION}-${OS_NAME}.zip" . && cd ..
          fi

      - name: Upload to Single Release
        if: (github.event.inputs.bump_type != 'test')
        uses: softprops/action-gh-release@v2
        with:
          name: CLI v${{ needs.version-bump.outputs.new_version}}
          tag_name: release-v${{ needs.version-bump.outputs.new_version }}
          files: dist/*
          append_body: true
          generate_release_notes: ${{ matrix.os == 'ubuntu-latest' }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
